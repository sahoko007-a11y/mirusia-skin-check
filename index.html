<!-- TOPに戻る版 / リセット削除版 -->
<!-- この下から全部コピー -->

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>紫外線に負けないお肌チェック</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #F7F3F1;
      color: #3B302C;
      line-height: 1.8;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 16px 44px;
    }

    .hero, .card, .result, .modeBox {
      background: #fff;
      border-radius: 22px;
      padding: 20px 16px;
      margin-bottom: 16px;
      box-shadow: 0 6px 18px rgba(90,60,50,0.08);
    }

    .label {
      display: inline-block;
      background: #8B5E52;
      color: #fff;
      padding: 4px 14px;
      border-radius: 999px;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .hero {
      text-align: center;
    }

    h1 {
      color: #8B5E52;
      font-size: 25px;
      line-height: 1.45;
    }

    .lead {
      text-align: left;
      font-size: 15px;
    }

    .note {
      background: #fff;
      border-left: 5px solid #D8C3B8;
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .question {
      font-weight: bold;
      color: #8B5E52;
      margin-bottom: 8px;
      font-size: 17px;
    }

    .choice {
      display: block;
      background: #FBF8F6;
      border: 1px solid #EADBD4;
      border-radius: 14px;
      padding: 11px 12px;
      margin: 8px 0;
      cursor: pointer;
    }

    input {
      margin-right: 8px;
      accent-color: #8B5E52;
    }

    button {
      width: 100%;
      border: none;
      background: #8B5E52;
      color: #fff;
      border-radius: 999px;
      padding: 15px;
      font-size: 17px;
      font-weight: bold;
      margin: 10px 0;
      cursor: pointer;
    }

    .afterBtn {
      background: #C9827A;
    }

    .subButton {
      background: #D8C3B8;
      color: #3B302C;
    }

    .result {
      display: none;
      border: 2px solid #D8C3B8;
    }

    .score {
      color: #8B5E52;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .compareBox {
      background: #FBF8F6;
      border: 1px solid #EADBD4;
      border-radius: 16px;
      padding: 14px;
      margin: 14px 0;
      text-align: center;
      font-weight: bold;
      color: #8B5E52;
    }

    .chartBox {
      background: #fff;
      border-radius: 18px;
      padding: 10px;
      margin: 16px 0;
      height: 330px;
    }

    .small {
      font-size: 12px;
      color: #6f625d;
      margin-top: 12px;
    }

    .currentMode {
      background: #FBF8F6;
      border: 1px solid #EADBD4;
      border-radius: 14px;
      padding: 12px;
      text-align: center;
      color: #8B5E52;
      font-weight: bold;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>

<body>

<div class="wrap">

  <section class="hero">
    <div class="label">Mirusia 7日チャレンジ</div>

    <h1>
      ☀️紫外線に負けない<br>
      お肌チェック
    </h1>

    <p class="lead">
      紫外線対策というと「塗る」「隠す」「浴びない」をイメージしがちですが、
      お肌は、睡眠・血流・胃腸・自律神経など、
      身体の内側ともつながっています。
      まずは今のお肌と身体の“現在地”を、
      やさしく確認してみましょう。
    </p>
  </section>

  <div class="note">
    診断ではありません😊<br>
    今の状態に気づくための、簡単なセルフチェックです。<br><br>

    初回は「ビフォーチェック」、
    7日チャレンジ後は「アフターチェック」を選んでください🌿
  </div>

  <section class="modeBox" id="modeBox">
    <button id="beforeModeButton">
      ビフォーチェックをする
    </button>

    <button class="afterBtn" id="afterModeButton">
      アフターチェックをする
    </button>

    <div class="small">
      ※ビフォー結果は、この端末のブラウザ内に保存されます。
    </div>
  </section>

  <div class="currentMode" id="currentMode"></div>

  <section class="result" id="resultArea">

    <div class="score" id="scoreArea"></div>

    <div class="compareBox" id="compareArea"></div>

    <div class="chartBox">
      <canvas id="radarChart"></canvas>
    </div>

    <button class="subButton" id="backButton">
      TOPに戻る
    </button>

  </section>

</div>

<script>

let currentMode = "";
let radarChart = null;

const storageKey = "mirusiaSkinCheckBefore";

document.getElementById("beforeModeButton").onclick = function() {
  currentMode = "before";
  runCheck();
};

document.getElementById("afterModeButton").onclick = function() {

  const before = localStorage.getItem(storageKey);

  if (!before) {
    alert("先にビフォーチェックをしてください😊");
    return;
  }

  currentMode = "after";
  runCheck();
};

document.getElementById("backButton").onclick = function() {
  location.reload();
};

function runCheck() {

  const values = [
    80,70,60,90,75,85
  ];

  const average =
    Math.round(values.reduce((a,b)=>a+b,0)/values.length);

  const currentData = {
    score: average,
    values: values
  };

  if (currentMode === "before") {

    localStorage.setItem(
      storageKey,
      JSON.stringify(currentData)
    );

    showBefore(currentData);

  } else {

    const beforeData =
      JSON.parse(localStorage.getItem(storageKey));

    showAfter(beforeData, currentData);
  }
}

function showBefore(data) {

  document.getElementById("resultArea").style.display = "block";

  document.getElementById("scoreArea").innerHTML =
    "ビフォー現在地：" + data.score + "点";

  document.getElementById("compareArea").innerHTML =
    "ビフォー結果を保存しました😊";

  drawChart(data.values, null);
}

function showAfter(before, after) {

  document.getElementById("resultArea").style.display = "block";

  document.getElementById("scoreArea").innerHTML =
    "アフター現在地：" + after.score + "点";

  document.getElementById("compareArea").innerHTML =
    "ビフォー：" + before.score + "点 → アフター：" + after.score + "点";

  drawChart(after.values, before.values);
}

function drawChart(currentValues, beforeValues) {

  const ctx =
    document.getElementById("radarChart");

  if (radarChart) radarChart.destroy();

  const datasets = [];

  if (beforeValues) {

    datasets.push({
      label: "ビフォー",
      data: beforeValues,
      borderColor: "#D8C3B8",
      backgroundColor: "rgba(216,195,184,0.2)",
      fill: true
    });
  }

  datasets.push({
    label: beforeValues ? "アフター" : "ビフォー",
    data: currentValues,
    borderColor: "#8B5E52",
    backgroundColor: "rgba(139,94,82,0.2)",
    fill: true
  });

  radarChart = new Chart(ctx, {
    type: "radar",
    data: {
      labels: [
        "乾燥",
        "朝の肌",
        "くすみ",
        "首肩",
        "呼吸",
        "睡眠"
      ],
      datasets: datasets
    }
  });
}

</script>

</body>
</html>
